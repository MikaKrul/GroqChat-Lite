<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroqChat Lite</title>
    <style>
        :root {
            --bg-dark: #1e1e2e;
            --bg-panel: #252538;
            --bg-chat-user: #3b3b54;
            --bg-chat-ai: #2a2a3c;
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --accent: #cba6f7;
            --accent-hover: #b4befe;
            --border: #313244;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navigatiebalk */
        nav {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            padding: 10px 20px;
            gap: 15px;
            user-select: none;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: var(--bg-dark);
            background-color: var(--accent);
        }

        /* Content Sectie */
        .content-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .tab-content {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            flex-direction: column;
            padding: 20px;
        }

        .tab-content.active {
            display: flex;
        }

        /* Chat Tabblad */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.1);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user {
            background-color: var(--bg-chat-user);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.ai {
            background-color: var(--bg-chat-ai);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid var(--border);
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            padding: 12px;
            font-size: 15px;
            resize: none;
            height: 48px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .send-btn {
            background-color: var(--accent);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Instellingen Tabblad */
        .settings-form {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
            display: flex;
        }

        .input-wrapper input {
            width: 100%;
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            padding: 10px 40px 10px 12px;
            border-radius: 6px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        .input-wrapper input:focus, select:focus {
            border-color: var(--accent);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
        }

        select {
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .status-badge {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot.red { background-color: #f38ba8; }
        .dot.green { background-color: #a6e3a1; }

        .loading-dots {
            align-self: flex-start;
            background-color: var(--bg-chat-ai);
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <nav>
        <button class="tab-btn active" onclick="switchTab('chat')">Chat</button>
        <button class="tab-btn" onclick="switchTab('settings')">Instellingen</button>
    </nav>

    <div class="content-container">
        <!-- Chat Tab -->
        <div id="tab-chat" class="tab-content active">
            <div id="chat-window">
                <div class="message ai">Welkom bij GroqChat Lite! Pas je API-key aan in de instellingen om te beginnen met chatten.</div>
            </div>
            <div class="chat-input-area">
                <textarea id="chat-input" placeholder="Typ een bericht... (Druk op Enter)" rows="1"></textarea>
                <button class="send-btn" onclick="sendMessage()">Verzend</button>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="tab-settings" class="tab-content">
            <div class="settings-form">
                <h2>Instellingen</h2>
                <div class="form-group">
                    <label for="api-key">Groq API Key</label>
                    <div class="input-wrapper">
                        <input type="password" id="api-key" placeholder="gsk_..." oninput="saveSettings()">
                        <button class="toggle-password" onclick="togglePasswordVisibility()">👁️</button>
                    </div>
                    <div id="status-message" class="status-badge">
                        <span class="dot red"></span> Geen API key ingevoerd
                    </div>
                </div>

                <div class="form-group">
                    <label for="model-select">AI Model</label>
                    <select id="model-select" onchange="saveSettings()">
                        <option value="llama3-8b-8192">Llama 3 8B (Extreem Snel)</option>
                        <option value="llama3-70b-8192">Llama 3 70B (Slimmer)</option>
                        <option value="mixtral-8x7b-32768">Mixtral 8x7B (Sterk in logica)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tabbladen wisselen
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // Toon/verberg API key
        function togglePasswordVisibility() {
            const input = document.getElementById('api-key');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Laad instellingen uit localStorage bij opstarten
        window.onload = function() {
            const savedKey = localStorage.getItem('groq_api_key');
            const savedModel = localStorage.getItem('groq_model');

            if (savedKey) {
                document.getElementById('api-key').value = savedKey;
                updateStatusBadge(true);
            }
            if (savedModel) {
                document.getElementById('model-select').value = savedModel;
            }

            // Enter detectie in textarea
            document.getElementById('chat-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        };

        // Sla instellingen automatisch op
        function saveSettings() {
            const key = document.getElementById('api-key').value.trim();
            const model = document.getElementById('model-select').value;

            localStorage.setItem('groq_api_key', key);
            localStorage.setItem('groq_model', model);

            updateStatusBadge(key.length > 0);
        }

        function updateStatusBadge(isValid) {
            const badge = document.getElementById('status-message');
            if (isValid) {
                badge.innerHTML = '<span class="dot green"></span> Sleutel lokaal opgeslagen';
            } else {
                badge.innerHTML = '<span class="dot red"></span> Geen API key ingevoerd';
            }
        }

        // Bericht versturen en streamen via Groq API
        async function sendMessage() {
            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if (!text) return;

            const apiKey = localStorage.getItem('groq_api_key');
            const model = localStorage.getItem('groq_model') || 'llama3-8b-8192';

            if (!apiKey) {
                alert('Voer eerst je Groq API key in bij Instellingen!');
                return;
            }

            // Voeg bericht van gebruiker toe aan venster
            const chatWindow = document.getElementById('chat-window');
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.textContent = text;
            chatWindow.appendChild(userDiv);
            inputEl.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Voeg loading indicator toe
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading-dots';
            loadingDiv.id = 'loading-indicator';
            loadingDiv.innerHTML = '<span></span><span></span><span></span>';
            chatWindow.appendChild(loadingDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Maak de lege container aan voor het AI antwoord
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai';
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: 'user', content: text }],
                        stream: true // Schakel streaming in voor live-tekst
                    })
                });

                // Verwijder laad-indicator zodra de stream start
                document.getElementById('loading-indicator').remove();
                chatWindow.appendChild(aiDiv);

                if (!response.ok) {
                    throw new Error(`API Fout: ${response.statusText}`);
                }

                // Chunk reader opzetten voor streaming data
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');

                    for (const line of lines) {
                        if (line.includes('[DONE]')) return;
                        if (line.startsWith('data: ')) {
                            const jsonStr = line.replace('data: ', '');
                            try {
                                const parsed = JSON.parse(jsonStr);
                                const content = parsed.choices[0].delta.content;
                                if (content) {
                                    aiDiv.textContent += content;
                                    chatWindow.scrollTop = chatWindow.scrollHeight;
                                }
                            } catch (e) {
                                // Sla onvolledige JSON-chunks over
                            }
                        }
                    }
                }

            } catch (error) {
                if (document.getElementById('loading-indicator')) {
                    document.getElementById('loading-indicator').remove();
                }
                aiDiv.textContent = `Fout: ${error.message}. Controleer je internetverbinding en API key.`;
                aiDiv.style.color = '#f38ba8';
                chatWindow.appendChild(aiDiv);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }
    </script>
</body>
</html>
