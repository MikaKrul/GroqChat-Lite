name: Build GroqChat Windows

on:
  workflow_dispatch:

jobs:
  build-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust base
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri Desktop App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Dit zorgt ervoor dat de bestanden als artifact aan de run worden gekoppeld:
          uploadWorkflowArtifacts: true 
          
          # We zetten deze op true/false om te voorkomen dat hij alsnog een release probeert te maken
          releaseDraft: false
          prerelease: false
