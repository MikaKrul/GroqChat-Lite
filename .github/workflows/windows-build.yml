name: Build GroqChat Windows

on:
  workflow_dispatch: # Zorgt ervoor dat je de build handmatig kunt starten via de Actions-knop

jobs:
  build-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Geüpgraded naar Node 24 om de deprecation te fixen

      - name: Install Rust base
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build Tauri Desktop App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0
          releaseName: 'GroqChat Production v1.0.0'
          releaseBody: 'Automatische Windows build van GroqChat Lite.'
          releaseDraft: false
          prerelease: false
