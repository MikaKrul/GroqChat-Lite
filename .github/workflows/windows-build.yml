name: Build GroqChat Windows

on:
  workflow_dispatch:

jobs:
  build-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust base
        uses: dtolnay/rust-toolchain@stable

      # We hebben de rust-cache stap hier tijdelijk weggehaald 
      # zodat GitHub gedwongen wordt alles fris te scannen.

      - name: Install dependencies
        run: npm install

      - name: Build Tauri Desktop App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0
          releaseName: 'GroqChat Production v1.0.0'
          releaseBody: 'Automatische Windows build van GroqChat Lite.'
          releaseDraft: false
          prerelease: false
