name: Build GroqChat Windows

on:
  workflow_dispatch:

jobs:
  build-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust base
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install dependencies
        run: npm install

      # We bouwen handmatig met de CLI, waarvan we net zagen dat het wél werkt!
      - name: Build Tauri Desktop App
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # We uploaden de resulterende installers direct als Artifact onderaan de run
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GroqChat-Windows-Build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/exe/*.exe
          if-no-files-found: error
