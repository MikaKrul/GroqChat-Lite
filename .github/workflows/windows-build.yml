name: Build GroqChat Windows

on:
  workflow_dispatch:

jobs:
  build-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust base
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install dependencies
        run: npm install

      # --- DIAGNOSTISCHE STAPPEN (FRIS PERSPECTIEF) ---
      - name: Waar zijn we en wat staat hier? (Debug)
        run: |
          echo "Huidige map:"
          pwd
          echo "Bestanden in de root:"
          dir
          echo "Bestanden in src-tauri:"
          dir src-tauri
        shell: pwsh

      - name: Wat zit er NU in tauri.conf.json op de runner? (Debug)
        run: |
          if (Test-Path src-tauri/tauri.conf.json) {
            type src-tauri/tauri.conf.json
          } else {
            echo "FOUT: src-tauri/tauri.conf.json bestaat GEEN EENS op de runner!"
          }
        shell: pwsh
      # ------------------------------------------------

      - name: Handmatige Tauri Build (Betrouwbaarder)
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
